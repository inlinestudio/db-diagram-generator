name: Build Electron Release

on:
  release:
    types:
      - published

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            script: package:linux

          - os: windows-latest
            platform: windows
            script: package:win

          - os: macos-latest
            platform: macos
            script: package:mac

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prepare macOS signing assets
        if: matrix.platform == 'macos'
        run: |
          mkdir -p "$RUNNER_TEMP/signing"
          echo "$MAC_CERT_P12_B64" | base64 --decode > "$RUNNER_TEMP/signing/cert.p12"
          echo "$APPLE_API_KEY_P8_B64" | base64 --decode > "$RUNNER_TEMP/signing/AuthKey.p8"
        env:
          MAC_CERT_P12_B64: ${{ secrets.MAC_CERT_P12 }}
          APPLE_API_KEY_P8_B64: ${{ secrets.APPLE_API_KEY_P8 }}

      - name: Build and package
        run: npm run ${{ matrix.script }}
        env:
          CSC_LINK: ${{ matrix.platform == 'macos' && format('{0}/signing/cert.p12', runner.temp) || '' }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CERT_PASSWORD }}
          APPLE_API_KEY: ${{ matrix.platform == 'macos' && format('{0}/signing/AuthKey.p8', runner.temp) || '' }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*.exe
            release/*.msi
            release/*.dmg
            release/*.zip
            release/*.AppImage
            release/*.deb
            release/*.rpm
            release/*.snap
            release/*.blockmap
            release/latest*.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}